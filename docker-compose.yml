services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: nava
      POSTGRES_PASSWORD: nava
      POSTGRES_DB: nava
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nava"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nava:nava@db:5432/nava
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
